<?xml version="1.0" encoding="UTF-8"?>
<!--
  Dayseam brand mark - "Convergence"

  The locked brand identity for Dayseam, agreed in DAY-161. This file
  is the canonical source of truth; every raster (Tauri app icons,
  website favicons, README badges, social og:images, etc.) is derived
  from this SVG. Re-rasterise from here, do not redraw.

  Concept

    Multiple thin strands enter from the upper-left at evenly varied
    angles and converge at a single anchor point on the right, exiting
    as a horizontal running stitch (the "seam"). The narrative is
    deliberate: many sources (GitHub, GitLab, Jira, Confluence, local
    Git, future connectors) gather at one point and are stitched into
    a single record. That is exactly what the app does.

  Geometry

    Canvas             1024 x 1024
    Background corner  rx = 229 (22.37 percent of side; macOS Big Sur+
                       feel, baked in because the .icns / macOS dock
                       does NOT auto-round square source icons)
    Convergence point  (680, 512), about 66 percent across, vertical
                       centre
    Strand endpoint    convergence point. All five strands meet here.
    Strand fan         five strands at angles -36, -18, 0, +18, +36
                       degrees from horizontal (18-degree spacing)
    Strand length      480 px from convergence point back toward the
                       upper-/lower-left
    Stroke weight      28 px (about 2.7 percent of canvas), round line
                       cap
    Seam               horizontal running stitch from (680, 512) to
                       (980, 512), dasharray 44/24 (dash 44, gap 24),
                       round line cap, cream stroke

  Palette (bolder, locked in DAY-161)

    Background charcoal   #17171A
    Strand gold           #E89A2C
    Strand teal           #2B8AA0
    Strand coral          #D94F6E
    Strand sage           #5BA567
    Strand indigo         #4D6DD0
    Seam cream            #F6F1E6

  Extensibility

    Adding a new connector (Slack, Linear, Sentry, ...) does NOT
    require redrawing the mark. Either:
      (a) add another strand to the fan at a new angle, OR
      (b) keep the five-strand silhouette and let the new connector
          rotate into the colour palette of an existing strand.
    Both readings are valid because the strand count is intentionally
    not a literal one-strand-per-connector claim, it is a gesture.

  Do not modify this file casually. Changes propagate to every
  packaged icon. See docs/brand/README.md for usage rules.
-->
<svg
  width="1024"
  height="1024"
  viewBox="0 0 1024 1024"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="Dayseam"
>
  <title>Dayseam</title>

  <rect
    x="0"
    y="0"
    width="1024"
    height="1024"
    rx="229"
    ry="229"
    fill="#17171A"
  />

  <g
    stroke-width="28"
    stroke-linecap="round"
    fill="none"
  >
    <line x1="292" y1="230" x2="680" y2="512" stroke="#E89A2C" />
    <line x1="224" y1="364" x2="680" y2="512" stroke="#2B8AA0" />
    <line x1="200" y1="512" x2="680" y2="512" stroke="#D94F6E" />
    <line x1="224" y1="660" x2="680" y2="512" stroke="#5BA567" />
    <line x1="292" y1="794" x2="680" y2="512" stroke="#4D6DD0" />

    <line
      x1="680"
      y1="512"
      x2="980"
      y2="512"
      stroke="#F6F1E6"
      stroke-dasharray="44 24"
    />
  </g>
</svg>
