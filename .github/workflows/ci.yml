name: ci

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (matches rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
          components: rustfmt,clippy

      - uses: Swatinem/rust-cache@v2

      # The Tauri binary's generate_context! macro checks that
      # `frontendDist` (apps/desktop/dist) exists at compile time, so we
      # need to build the Vite bundle before any cargo command that
      # compiles the desktop crate.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Build frontend bundle
        run: pnpm --filter @dayseam/desktop build

      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace --all-features

  # Cheap Linux build of every crate that does NOT depend on Tauri /
  # the desktop frontend bundle. macOS-only `rust` job above is the
  # source of truth for the full workspace, but most contributors
  # (and most future CI consumers) will be on Linux, so we want every
  # core / engine / sink / connector crate to keep building and
  # testing on Ubuntu without having to pay for another macOS minute.
  rust-linux:
    name: rust-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (matches rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (workspace minus desktop)
        run: cargo test --workspace --exclude dayseam-desktop --all-features

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm -r lint
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Test
        run: pnpm --recursive --if-present run test

  # Release-engineering shell tests. These exercise the helpers the
  # release workflow depends on (version bumping, PREV resolution,
  # release-notes extraction) against scratch git repos and
  # synthetic CHANGELOGs — a regression test net for a layer that
  # was previously only validated when a real release ran. The
  # v0.1.0 capstone discovered two bugs in release.yml (Unreleased-
  # only preflight and naive PREV inference) that would have been
  # caught here if the job had existed a PR earlier; this job
  # closes that loop for every release from v0.1.1 onward.
  shell-scripts:
    # DAY-122 / R-5. Pre-v0.6.5 this job only ran on ubuntu-latest,
    # which left a whole class of silent regressions — BSD vs GNU
    # awk (`\b` word-boundary portability, handled by the SF-3
    # patch), BSD vs GNU `grep -E` differences, `mktemp -d` flag
    # skew, `sed -i` in-place semantics — outside the CI matrix.
    # Adding a `macos-latest` leg means any script in `scripts/ci`
    # or `scripts/release` that silently uses a GNU-only flag
    # fails here before it bites the release-only macOS runner.
    # The self-tests for every gate run identically under both
    # shells, so the cost of the extra matrix leg is a few minutes
    # against the repo's eng-minute budget.
    name: shell-scripts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: test-bump-version.sh
        run: bash scripts/release/test-bump-version.sh
      - name: test-resolve-prev-version.sh
        run: bash scripts/release/test-resolve-prev-version.sh
      - name: test-extract-release-notes.sh
        run: bash scripts/release/test-extract-release-notes.sh
      # DAY-113 / F-10: enforce that no production file adds a bare
      # `tokio::spawn` or `tauri::async_runtime::spawn` call. The
      # workspace ships `dayseam_core::runtime::supervised_spawn`
      # precisely so panic-eating fire-and-forget spawns (like the
      # one F-10 found in `startup.rs`) become a gate failure at PR
      # time rather than a silent production bug weeks later. The
      # companion `test-no-bare-spawn.sh` fuzzes the gate itself
      # against acceptance/rejection fixtures so a regression in the
      # gate logic also fails CI.
      - name: test-no-bare-spawn.sh (gate self-test)
        run: bash scripts/ci/test-no-bare-spawn.sh
      - name: no-bare-spawn.sh (workspace scan)
        run: bash scripts/ci/no-bare-spawn.sh
      # DAY-122 / T-3: validate `apps/desktop/src-tauri/entitlements.plist`
      # at PR time, not only at release time. The same two checks run
      # later inside `scripts/release/build-dmg.sh` — moving them into
      # a standalone script lets `ci.yml` enforce them on every PR so
      # a regression (re-introducing an XML comment, or breaking the
      # plist) fails fast instead of exploding four minutes into the
      # universal cargo build on release day. On ubuntu-latest
      # `plutil` isn't available, so the lint branch is skipped and
      # the comment gate (plain `grep`) still runs — which is the
      # check that catches the actual v0.6.2 regression mode. The
      # release workflow keeps running the full gate on macOS via
      # `build-dmg.sh`, which now delegates to the same script so
      # there is a single source of truth.
      - name: test-check-entitlements.sh (gate self-test)
        run: bash scripts/ci/test-check-entitlements.sh
      - name: check-entitlements.sh (entitlements.plist validity)
        run: bash scripts/ci/check-entitlements.sh
