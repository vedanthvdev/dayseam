name: ci

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (matches rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
          components: rustfmt,clippy

      - uses: Swatinem/rust-cache@v2

      # The Tauri binary's generate_context! macro checks that
      # `frontendDist` (apps/desktop/dist) exists at compile time, so we
      # need to build the Vite bundle before any cargo command that
      # compiles the desktop crate.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Build frontend bundle
        run: pnpm --filter @dayseam/desktop build

      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace --all-features

  # Cheap Linux build of every crate that does NOT depend on Tauri /
  # the desktop frontend bundle. macOS-only `rust` job above is the
  # source of truth for the full workspace, but most contributors
  # (and most future CI consumers) will be on Linux, so we want every
  # core / engine / sink / connector crate to keep building and
  # testing on Ubuntu without having to pay for another macOS minute.
  rust-linux:
    name: rust-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (matches rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (workspace minus desktop)
        run: cargo test --workspace --exclude dayseam-desktop --all-features

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm -r lint
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Test
        run: pnpm --recursive --if-present run test

  # Release-engineering shell tests. These exercise the helpers the
  # release workflow depends on (version bumping, PREV resolution,
  # release-notes extraction) against scratch git repos and
  # synthetic CHANGELOGs — a regression test net for a layer that
  # was previously only validated when a real release ran. The
  # v0.1.0 capstone discovered two bugs in release.yml (Unreleased-
  # only preflight and naive PREV inference) that would have been
  # caught here if the job had existed a PR earlier; this job
  # closes that loop for every release from v0.1.1 onward.
  shell-scripts:
    name: shell-scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: test-bump-version.sh
        run: bash scripts/release/test-bump-version.sh
      - name: test-resolve-prev-version.sh
        run: bash scripts/release/test-resolve-prev-version.sh
      - name: test-extract-release-notes.sh
        run: bash scripts/release/test-extract-release-notes.sh
      # DAY-113 / F-10: enforce that no production file adds a bare
      # `tokio::spawn` or `tauri::async_runtime::spawn` call. The
      # workspace ships `dayseam_core::runtime::supervised_spawn`
      # precisely so panic-eating fire-and-forget spawns (like the
      # one F-10 found in `startup.rs`) become a gate failure at PR
      # time rather than a silent production bug weeks later. The
      # companion `test-no-bare-spawn.sh` fuzzes the gate itself
      # against acceptance/rejection fixtures so a regression in the
      # gate logic also fails CI.
      - name: test-no-bare-spawn.sh (gate self-test)
        run: bash scripts/ci/test-no-bare-spawn.sh
      - name: no-bare-spawn.sh (workspace scan)
        run: bash scripts/ci/no-bare-spawn.sh
