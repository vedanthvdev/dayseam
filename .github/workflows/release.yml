name: release

# Triggers on every closed PR; the `if` gate below restricts real runs
# to PRs that (a) actually merged and (b) carried a `semver:patch`,
# `semver:minor`, or `semver:major` label. `semver:none` PRs never
# reach the release job — that is the entire contract the `check-
# semver-label` workflow exists to enforce on the way in.
#
# The manual `workflow_dispatch` path is the dry-run surface Task 6
# step 6.5 calls out: `gh workflow run release.yml -f level=minor -f
# dry_run=true` on this branch should build the universal `.dmg`
# without creating a tag or a GitHub Release, so a maintainer can
# double-click the artefact on a local Mac to validate the
# Gatekeeper-bypass docs before opening a real release.
on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      level:
        description: "Semver level to bump (patch / minor / major / none)"
        required: true
        default: "none"
      dry_run:
        description: "If true, build the DMG but skip tagging and the GitHub Release"
        required: true
        default: "true"

# Deliberate minimal token posture: `contents: write` is the only
# scope the release job needs (to push the `chore(release):` commit,
# create the tag, and upload assets to the GitHub Release). Apple
# codesign + notarization secrets (the `APPLE_*` family) are read
# from repo secrets directly at job time; they are strictly optional
# — when any of them is unset the workflow auto-falls-back to
# ad-hoc-signed unnotarized bundles. See
# docs/release/CODESIGN.md for the contract, rotation steps, and
# the "how to tell which mode a run used" playbook.
permissions:
  contents: write

# DAY-164. Release runs serialize on a GLOBAL key, not per-ref. The
# previous `release-${{ github.ref }}` grouped per PR, which let two
# different PRs' release runs proceed in parallel. Combined with the
# `--force-with-lease=master:<sha>` push that only checked the tip
# SHA (not descendant-ness), a v0.N PR that merged mid-flight of a
# v0.N-1 release could have its `chore(release): v0.N-1` commit
# silently overwritten and orphaned from master's linear history.
# That is exactly what happened to v0.8.1's `chore(release)` commit
# `56f0c2a` during the v0.8.1 → v0.8.2 pair — the tag still points
# at the commit but `git log origin/master` skips it entirely.
#
# A single global group forces Run B to wait for Run A to push,
# tag, and publish before it can even start checking out. This is
# the cheapest correctness fix; releases are infrequent enough (one
# per merged semver:patch/minor/major PR) that serializing a few
# minutes of queue time is invisible to users. The paired change
# below (plain `git push` + descendant assertion) is the
# belt-and-braces layer that catches the residual race where Run B's
# `merge_commit_sha` — stable at PR merge time — is stale relative
# to the master tip Run A just pushed.
concurrency:
  group: release-master-push
  cancel-in-progress: false

jobs:
  # DAY-122 / R-2. Branch-protection is the primary gate for "don't
  # release a commit with red CI", but an admin-merged PR can slip
  # past it (GitHub lets branch-protection admins merge over a
  # failing required check). This lightweight job polls the
  # `ci.yml` and `e2e.yml` check-runs for the merge commit and
  # refuses to proceed unless every required run is conclusive +
  # successful. `workflow_dispatch` bypasses the poll because it
  # is explicitly a maintainer-driven surface; the dry-run flag
  # keeps that path safe.
  wait-for-ci:
    name: wait-for-ci (R-2)
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true &&
        (contains(github.event.pull_request.labels.*.name, 'semver:patch') ||
         contains(github.event.pull_request.labels.*.name, 'semver:minor') ||
         contains(github.event.pull_request.labels.*.name, 'semver:major')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
    steps:
      - name: Poll required check-runs on the merge commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.merge_commit_sha }}
          # The required contexts we refuse to release without. If a
          # new CI job becomes required, add it here AND to the
          # branch-protection rules — this gate is defense-in-depth,
          # not a replacement. The `shell-scripts` job is matrix'd
          # across ubuntu-latest and macos-latest (DAY-122 / R-5),
          # and GitHub reports each matrix leg as a distinct
          # check-run named `<job> (<matrix value>)`.
          REQUIRED_CHECKS: |
            rust
            rust-linux
            frontend
            shell-scripts (ubuntu-latest)
            shell-scripts (macos-latest)
          # Total wait: 10 × 60s = 10 minutes. CI should already be
          # long-settled on a merged PR, so a 10-minute budget is
          # generous; the job fails fast with a clear message if it
          # runs out.
          MAX_ATTEMPTS: 10
          SLEEP_SECONDS: 60
        run: |
          set -euo pipefail
          if [[ -z "$SHA" || "$SHA" == "null" ]]; then
            echo "::error::merge_commit_sha unavailable on event payload; cannot poll CI status." >&2
            exit 1
          fi
          echo "==> Waiting for required checks on $SHA in $REPO:"
          echo "$REQUIRED_CHECKS" | sed 's/^/    - /'
          required=()
          while IFS= read -r name; do
            [[ -n "$name" ]] && required+=("$name")
          done <<<"$REQUIRED_CHECKS"

          attempt=0
          while (( attempt < MAX_ATTEMPTS )); do
            attempt=$((attempt + 1))
            echo "==> Attempt ${attempt}/${MAX_ATTEMPTS}"
            # GitHub's check-runs API paginates; `--paginate` plus
            # `-q` flattens every page's `.check_runs[]` into one
            # stream so a CI job that ran on a pagination boundary
            # is not silently invisible.
            runs_json="$(gh api --paginate "repos/${REPO}/commits/${SHA}/check-runs" -q '.check_runs[] | {name, status, conclusion}' | jq -s '.')"
            all_ok=true
            missing=()
            failing=()
            for need in "${required[@]}"; do
              entry="$(echo "$runs_json" | jq -c --arg n "$need" '[.[] | select(.name == $n)] | last')"
              if [[ -z "$entry" || "$entry" == "null" ]]; then
                missing+=("$need")
                all_ok=false
                continue
              fi
              status="$(echo "$entry" | jq -r '.status')"
              conclusion="$(echo "$entry" | jq -r '.conclusion')"
              if [[ "$status" != "completed" ]]; then
                echo "    - $need: status=$status (waiting)"
                all_ok=false
                continue
              fi
              if [[ "$conclusion" != "success" ]]; then
                failing+=("$need:$conclusion")
                all_ok=false
              else
                echo "    - $need: success"
              fi
            done

            if (( ${#failing[@]} > 0 )); then
              echo "::error::Required checks failed on $SHA: ${failing[*]}. Refusing to release." >&2
              exit 1
            fi

            if [[ "$all_ok" == "true" ]]; then
              echo "==> All required checks green on $SHA."
              exit 0
            fi

            if (( ${#missing[@]} > 0 )); then
              echo "    (missing runs: ${missing[*]})"
            fi
            if (( attempt < MAX_ATTEMPTS )); then
              sleep "$SLEEP_SECONDS"
            fi
          done

          echo "::error::Timed out after ${MAX_ATTEMPTS} attempts waiting for required checks on $SHA. Re-run CI on master and retrigger the release workflow." >&2
          exit 1

  release:
    name: release
    # DAY-122 / R-2: `wait-for-ci` runs on the merged-PR path and
    # refuses to let the release proceed unless every required CI
    # check is green on the merge commit. `workflow_dispatch`
    # bypasses the polling job (no merge commit exists to poll),
    # so we allow `needs.wait-for-ci.result == 'skipped'` through.
    # This is strictly defense-in-depth — branch protection is the
    # primary gate — but an admin-merge that bypasses protection
    # is exactly the failure mode we do not want to discover by
    # shipping a broken DMG.
    needs: [wait-for-ci]
    # Combined job-level gate. The `always()` preamble is required
    # so this job is evaluated even when `wait-for-ci` is skipped
    # (manual dispatch); without it GitHub would treat "any upstream
    # not successful" as a skip of the release.
    if: >
      always() &&
      (needs.wait-for-ci.result == 'success' || needs.wait-for-ci.result == 'skipped') &&
      (
        (github.event_name == 'workflow_dispatch') ||
        (github.event_name == 'pull_request' && github.event.pull_request.merged == true &&
          (contains(github.event.pull_request.labels.*.name, 'semver:patch') ||
           contains(github.event.pull_request.labels.*.name, 'semver:minor') ||
           contains(github.event.pull_request.labels.*.name, 'semver:major')))
      )
    runs-on: macos-latest
    steps:
      - name: Checkout (fetch tags so bump-version.sh can read previous release)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.ref }}

      # Extract the semver level from the PR label (for merged PRs) or
      # the workflow input (for manual dispatch). The dry-run flag
      # follows the same split — PRs always run the "real" path,
      # workflow_dispatch defaults to dry-run so the step 6.5 dry-run
      # is the safe default.
      - name: Resolve semver level + dry-run flag
        id: level
        env:
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          DISPATCH_LEVEL: ${{ github.event.inputs.level }}
          DISPATCH_DRY_RUN: ${{ github.event.inputs.dry_run }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "level=$DISPATCH_LEVEL" >>"$GITHUB_OUTPUT"
            echo "dry_run=$DISPATCH_DRY_RUN" >>"$GITHUB_OUTPUT"
          else
            level="$(printf '%s' "$PR_LABELS" | jq -r '.[] | select(startswith("semver:"))' | head -n 1 | sed 's/^semver://')"
            if [[ -z "$level" || "$level" == "none" ]]; then
              echo "No bump-worthy semver label found on merged PR; this should have been filtered by the job-level if." >&2
              exit 1
            fi
            echo "level=$level" >>"$GITHUB_OUTPUT"
            echo "dry_run=false" >>"$GITHUB_OUTPUT"
          fi

      # Resolve the "previous" version the release bumps *from*. The
      # helper encapsulates the fallback order (most recent v* tag →
      # VERSION at HEAD^ → 0.0.0) and is unit-tested by
      # test-resolve-prev-version.sh so future releases don't silently
      # regress the first-release-vs-steady-state split.
      - name: Resolve PREV version for bump-version.sh
        id: prev
        run: |
          prev="$(scripts/release/resolve-prev-version.sh)"
          echo "prev=$prev" >>"$GITHUB_OUTPUT"
          echo "==> PREV version: $prev"

      # Resolve the target version. For the capstone PR 9 (semver:minor
      # from 0.0.0) the tree is already pre-bumped to 0.1.0 so this is
      # a no-op read; for every later release the script computes the
      # bump from the most recent git tag and rewrites the three
      # version-bearing files.
      - name: Compute target version via bump-version.sh
        id: bump
        env:
          DAYSEAM_PREV_VERSION: ${{ steps.prev.outputs.prev }}
        run: |
          version="$(scripts/release/bump-version.sh ${{ steps.level.outputs.level }})"
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "==> Target version: v$version"

      # Pre-flight gate: refuse to release if the CHANGELOG has no
      # entries describing this release. An empty release notes block
      # is a smell (either the PR forgot to document, or the release
      # is vacuous) and the workflow should fail fast, not publish.
      #
      # The helper prefers the explicit `[$TARGET]` section (the Task
      # 9-style capstone shape, and the only correct choice once
      # `[Unreleased]` has started accumulating entries for a *later*
      # release) and falls back to `[Unreleased]` for normal
      # `semver:patch` bumps where no `[$TARGET]` block exists yet.
      # The extracted body is written to $RUNNER_TEMP/release-notes.md
      # so the later `gh release create --notes-file` call reuses
      # exactly what preflight validated — no second extraction, no
      # drift between gate and body.
      - name: Preflight — extract release notes and assert non-empty
        id: notes
        env:
          TARGET: ${{ steps.bump.outputs.version }}
        run: |
          body_file="${RUNNER_TEMP:-/tmp}/release-notes.md"
          scripts/release/extract-release-notes.sh "$TARGET" >"$body_file"
          echo "notes_file=$body_file" >>"$GITHUB_OUTPUT"
          echo "==> Release notes preview:"
          head -n 20 "$body_file"

      # DAY-155. Close `[Unreleased]` → `[$TARGET] - <today>` and open
      # a fresh empty `[Unreleased]` above it. Before this step existed
      # the release workflow never touched CHANGELOG.md at all, so
      # `extract-release-notes.sh` fell back to `[Unreleased]` on two
      # consecutive releases and shipped the same notes twice (v0.7.0
      # → v0.8.0 is the first documented instance on this repo; the
      # v0.8.1 → v0.8.2 pair was the second, and is what finally
      # motivated the automation). Running *after* the preflight
      # extract (not before) preserves the historical contract that
      # the published release body is the `[Unreleased]` slice at
      # merge-commit time; the CHANGELOG rewrite then propagates into
      # the same `chore(release)` commit as the VERSION / Cargo.toml /
      # tauri.conf.json bumps — one logical "release was cut" commit,
      # not two.
      #
      # The helper is a no-op when `[$TARGET]` already exists (the
      # capstone-PR authoring pattern pre-renames the block for a
      # reviewable diff) or when `[Unreleased]` is empty, so no
      # special-casing is needed here. Dry-run skips the rewrite
      # because dry-runs never commit or push — leaving CHANGELOG.md
      # untouched on a dry-run also avoids polluting a maintainer's
      # local tree if they run `gh workflow run release.yml -f
      # dry_run=true` against a branch.
      - name: Close [Unreleased] into [$VERSION] in CHANGELOG.md
        if: steps.level.outputs.dry_run != 'true'
        env:
          TARGET: ${{ steps.bump.outputs.version }}
        run: |
          scripts/release/close-changelog.sh "$TARGET"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain (matches rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      # The Tauri v2 CLI binds the `CI` environment variable to its
      # `--ci` boolean flag and requires `true` / `false`; we had set
      # `CI: "1"` which caused `tauri build` to reject the value with
      # `invalid value '1' for '--ci'` and abort before any bundle
      # landed in `target/`. GitHub Actions already injects `CI=true`
      # for every job, so the fix is simply to stop overriding it.
      #
      # `shell: bash` enables `pipefail` (the GHA default `/bin/bash
      # -e {0}` does not), so a failing `build-dmg.sh` can no longer
      # be masked by a successful `tail -n 1` — the build error is
      # what surfaces the workflow failure, not a downstream "binary
      # not found" assertion three steps later.
      #
      # DAY-108: exporting `TAURI_SIGNING_PRIVATE_KEY` and its
      # password triggers Tauri's bundler to (a) also emit
      # `Dayseam.app.tar.gz` under the `macos/` bundle dir (because
      # `bundle.targets` now includes `"updater"`), (b) sign it
      # with minisign, and (c) write `Dayseam.app.tar.gz.sig`
      # next to it. Both are consumed by the "Assemble updater
      # manifest" step below. The secrets must be set on the repo
      # before merging a PR that cuts a new release — the
      # preflight guard below asserts they are present so a stale
      # or missing key fails here, not silently in the generated
      # `latest.json`.
      - name: Preflight — assert updater signing secrets are set
        if: steps.level.outputs.dry_run != 'true'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret missing. The in-app updater cannot verify this release; refusing to publish. Set it from `tauri signer generate -w <password>` output." >&2
            exit 1
          fi
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" ]]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY_PASSWORD secret missing; the private key cannot be decrypted at build time. Refusing to publish." >&2
            exit 1
          fi
          echo "==> Updater signing secrets present."

      # DAY-124 / #59. Apple codesign mode is resolved up-front so every
      # downstream step can gate on a single signal. The contract:
      #
      #   - `developer-id` is activated by the presence of the
      #     `APPLE_CERTIFICATE` secret. When that secret is set, the
      #     remaining `APPLE_*` secrets (CERTIFICATE_PASSWORD,
      #     SIGNING_IDENTITY, ID, PASSWORD, TEAM_ID) become REQUIRED
      #     and the preflight step below fails fast if any is
      #     missing. A half-configured secret set is a worse state
      #     than no secrets at all — Tauri would sign the bundle
      #     but fail to notarize, surfacing a confusing mid-build
      #     failure instead of a clear "rotate secret X" error.
      #
      #   - `ad-hoc` is the default and fallback. The workflow
      #     continues to emit ad-hoc-signed, unnotarized bundles
      #     (matching v0.6.2 onwards) and the `UNSIGNED-FIRST-RUN`
      #     docs still apply to downloaders. This is what lets a
      #     fork / contributor without Apple creds still exercise
      #     the full release path end-to-end.
      #
      # `spctl --assess` at the end is only meaningful in
      # developer-id mode; it's skipped in ad-hoc mode because
      # Gatekeeper rejects ad-hoc sigs by design.
      - name: Resolve Apple codesign mode
        id: codesign
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [[ -n "${APPLE_CERTIFICATE:-}" ]]; then
            echo "mode=developer-id" >>"$GITHUB_OUTPUT"
            echo "==> Apple codesign mode: developer-id (full signing + notarization)"
          else
            echo "mode=ad-hoc" >>"$GITHUB_OUTPUT"
            echo "==> Apple codesign mode: ad-hoc (APPLE_CERTIFICATE secret unset; fallback path)"
          fi

      # DAY-124: defense-in-depth against a half-configured secret
      # set. If APPLE_CERTIFICATE is set but (say) APPLE_PASSWORD is
      # not, Tauri would sign the .app happily, then fail
      # notarization mid-build with a confusing `xcrun notarytool`
      # error message 4 minutes into the universal build. Failing
      # the whole run before we spend a single cargo-second on
      # signing is cheaper and clearer. We also refuse the
      # developer-id path on dry-runs — a dry-run should never
      # decrypt production keychain material.
      - name: Preflight — assert Apple codesign secrets are complete
        if: steps.codesign.outputs.mode == 'developer-id' && steps.level.outputs.dry_run != 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=()
          [[ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]] && missing+=("APPLE_CERTIFICATE_PASSWORD")
          [[ -z "${APPLE_SIGNING_IDENTITY:-}" ]] && missing+=("APPLE_SIGNING_IDENTITY")
          [[ -z "${APPLE_ID:-}" ]] && missing+=("APPLE_ID")
          [[ -z "${APPLE_PASSWORD:-}" ]] && missing+=("APPLE_PASSWORD")
          [[ -z "${APPLE_TEAM_ID:-}" ]] && missing+=("APPLE_TEAM_ID")
          if (( ${#missing[@]} > 0 )); then
            echo "::error::APPLE_CERTIFICATE is set (activating developer-id mode) but these companion secrets are missing: ${missing[*]}. Either set all six (see docs/release/CODESIGN.md) or unset APPLE_CERTIFICATE to fall back to ad-hoc mode." >&2
            exit 1
          fi
          if [[ "${APPLE_SIGNING_IDENTITY}" != "Developer ID Application:"* ]]; then
            echo "::error::APPLE_SIGNING_IDENTITY does not start with 'Developer ID Application:'. Got: '${APPLE_SIGNING_IDENTITY}'. Use the full certificate common name, e.g. 'Developer ID Application: Your Name (TEAMID123)'." >&2
            exit 1
          fi
          if [[ ! "${APPLE_TEAM_ID}" =~ ^[A-Z0-9]{10}$ ]]; then
            echo "::error::APPLE_TEAM_ID '${APPLE_TEAM_ID}' is not a 10-character alphanumeric Team ID. Check your Apple Developer membership page." >&2
            exit 1
          fi
          echo "==> All six Apple codesign secrets present and well-formed."

      # DAY-124: fast-fail preflight of the .p12 payload BEFORE
      # spending 4 minutes on the universal cargo build. Tauri's
      # bundler will later import the cert into its own
      # `tauri-build.keychain` (see
      # crates/tauri-bundler/src/bundle/macos/sign.rs upstream) and
      # a bad base64 payload or wrong .p12 password would fail deep
      # inside `tauri build` with a log that doesn't name the
      # offending secret. Decoding + validating here surfaces the
      # exact bad secret in ~1 second. The decoded .p12 is
      # immediately zeroed and unlinked — it's Tauri's job to hold
      # the material during the real signing step, not ours.
      #
      # We intentionally do NOT pre-create a keychain: Tauri does
      # that internally, and a duplicate identity across two
      # keychains triggers the `codesign: ambiguous` error seen in
      # tauri-apps/tauri#9760. The env vars flow straight through
      # from secrets to `tauri build`, which is the documented
      # contract (https://v2.tauri.app/distribute/sign/macos/).
      - name: Preflight — validate .p12 certificate payload
        if: steps.codesign.outputs.mode == 'developer-id' && steps.level.outputs.dry_run != 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          P12_PATH="${RUNNER_TEMP}/apple-cert-probe.p12"
          if ! echo "$APPLE_CERTIFICATE" | base64 --decode > "$P12_PATH" 2>/dev/null; then
            echo "::error::APPLE_CERTIFICATE is not valid base64. Re-export the .p12 and encode with 'openssl base64 -A -in cert.p12'." >&2
            exit 1
          fi
          if [[ ! -s "$P12_PATH" ]]; then
            echo "::error::APPLE_CERTIFICATE decoded to zero bytes. The secret is empty or corrupt." >&2
            exit 1
          fi
          # `openssl pkcs12 -noout -passin …` only parses the PKCS#12
          # structure; it doesn't import anything. A wrong password
          # exits non-zero with a distinctive `Mac verify error`
          # message, so we can fail fast with a pointed error.
          if ! openssl pkcs12 -noout -in "$P12_PATH" -passin "pass:${APPLE_CERTIFICATE_PASSWORD}" 2>/tmp/p12.err; then
            if grep -q 'Mac verify' /tmp/p12.err; then
              echo "::error::APPLE_CERTIFICATE_PASSWORD does not match the .p12 in APPLE_CERTIFICATE. Verify you used the same passphrase when exporting from Keychain Access." >&2
            else
              echo "::error::Failed to parse .p12 certificate. Contents of openssl stderr:" >&2
              cat /tmp/p12.err >&2
            fi
            dd if=/dev/urandom of="$P12_PATH" bs=1024 count=1 conv=notrunc 2>/dev/null || true
            rm -f "$P12_PATH" /tmp/p12.err
            exit 1
          fi
          echo "==> .p12 certificate payload validates and decrypts with the provided password."
          # Zero the decoded bytes before unlink — forensic-recovery
          # hardening is cheap and appropriate for a Developer ID
          # private key.
          dd if=/dev/urandom of="$P12_PATH" bs=1024 count=1 conv=notrunc 2>/dev/null || true
          rm -f "$P12_PATH" /tmp/p12.err

      - name: Build universal .dmg via build-dmg.sh
        id: build
        shell: bash
        env:
          # Wire Tauri's auto-signing. Empty strings on a dry-run
          # produce an unsigned bundle; the assemble-manifest step
          # below is itself gated on `dry_run != 'true'` so no
          # `latest.json` is published for a dry-run either — both
          # gates keep the path aligned.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # DAY-124 / #59. Tauri 2's bundler reads these six env vars
          # and auto-wires codesigning + notarization end-to-end:
          #
          #   - APPLE_SIGNING_IDENTITY overrides the `-` in
          #     tauri.conf.json > bundle > macOS > signingIdentity
          #     (env wins; the config value is the local-dev
          #     fallback). When empty, Tauri respects the config
          #     default and produces an ad-hoc-signed bundle.
          #   - APPLE_CERTIFICATE / _PASSWORD are consumed by the
          #     `security import` keychain flow ABOVE, not by the
          #     Tauri CLI directly, but we still pass them here in
          #     case a future Tauri version wires them differently.
          #   - APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID activate
          #     the notarytool submission + stapling path in
          #     Tauri's bundler. With all three set, `tauri build`
          #     runs `xcrun notarytool submit --wait` and staples
          #     the resulting ticket before returning. Empty → no
          #     notarization attempt.
          #
          # All six are pass-throughs from secrets: if unset they
          # are empty strings and Tauri falls back to the ad-hoc
          # path, which is the v0.6.6 behaviour we preserve as the
          # graceful fallback. The Resolve Apple codesign mode step
          # above is the single source of truth for which mode we
          # are in; these values are just what Tauri consumes.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          dmg="$(scripts/release/build-dmg.sh ${{ steps.bump.outputs.version }} | tail -n 1)"
          echo "dmg=$dmg" >>"$GITHUB_OUTPUT"
          echo "==> DMG artefact: $dmg"

      # DAY-108: copy the signed updater tarball + signature to a
      # versioned path alongside the DMG, and assemble the
      # `latest.json` manifest that `plugins.updater.endpoints[0]`
      # points at. Three artefacts are attached to every release:
      #
      #   - Dayseam-v$VERSION.dmg           (fresh-install bundle)
      #   - Dayseam-v$VERSION.app.tar.gz    (updater binary)
      #   - Dayseam-v$VERSION.app.tar.gz.sig (minisign signature)
      #   - latest.json                     (updater manifest)
      #
      # `latest.json` must be the literal filename since that's
      # what the plugin resolves via
      # `https://github.com/…/releases/latest/download/latest.json`
      # — renaming it to something version-stamped would break
      # every installed client's update check silently.
      - name: Assemble updater manifest (latest.json + signed tarball)
        id: updater
        if: steps.level.outputs.dry_run != 'true'
        shell: bash
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
        run: |
          target_dir="$(cargo metadata --format-version 1 --no-deps --manifest-path Cargo.toml | jq -r '.target_directory')"
          bundle_dir="${target_dir}/universal-apple-darwin/release/bundle/macos"
          src_tar="$(ls -t "${bundle_dir}"/*.app.tar.gz 2>/dev/null | head -n 1 || true)"
          src_sig="$(ls -t "${bundle_dir}"/*.app.tar.gz.sig 2>/dev/null | head -n 1 || true)"
          if [[ -z "$src_tar" || ! -f "$src_tar" ]]; then
            echo "::error::Tauri did not emit a .app.tar.gz at ${bundle_dir}. Confirm `bundle.targets` in tauri.conf.json includes 'updater'." >&2
            exit 1
          fi
          if [[ -z "$src_sig" || ! -f "$src_sig" ]]; then
            echo "::error::Tauri did not emit a .app.tar.gz.sig at ${bundle_dir}. Confirm TAURI_SIGNING_PRIVATE_KEY env was set during the build step." >&2
            exit 1
          fi
          out_dir="${GITHUB_WORKSPACE}/dist/release"
          mkdir -p "$out_dir"
          out_tar="${out_dir}/Dayseam-v${VERSION}.app.tar.gz"
          out_sig="${out_dir}/Dayseam-v${VERSION}.app.tar.gz.sig"
          cp "$src_tar" "$out_tar"
          cp "$src_sig" "$out_sig"
          # Derive the download URL from the GitHub Actions context instead of
          # hardcoding the owner/repo. The `latest.json` we generate is consumed
          # by every already-shipped Dayseam binary via the updater endpoint in
          # `tauri.conf.json`, and a baked-in owner means a future org move
          # would silently leave release artifacts pointing at a redirected URL.
          # Sourcing the owner from `github.repository` keeps this job portable
          # so a transferred repo keeps producing correct updater manifests.
          download_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/Dayseam-v${VERSION}.app.tar.gz"
          out_json="${out_dir}/latest.json"
          scripts/release/generate-latest-json.sh \
            "$VERSION" \
            "$download_url" \
            "$out_sig" \
            "$NOTES_FILE" \
            >"$out_json"
          echo "tar=$out_tar" >>"$GITHUB_OUTPUT"
          echo "sig=$out_sig" >>"$GITHUB_OUTPUT"
          echo "json=$out_json" >>"$GITHUB_OUTPUT"
          echo "==> Updater manifest ready:"
          cat "$out_json"

      # Universal-bundle assertion: the fused binary inside the .app
      # MUST carry both arm64 and x86_64 slices. `lipo -archs` emits
      # a space-separated list we grep to fail-fast on a thin build.
      #
      # `cargo metadata` resolves the workspace target directory
      # rather than hardcoding `apps/desktop/src-tauri/target/...`.
      # Cargo workspaces write to `<workspace_root>/target/`, not
      # per-crate — DAY-66 fixed that and also enabled pipefail so a
      # failed `cargo metadata | jq` surfaces at the pipeline.
      #
      # The binary *inside* Dayseam.app/Contents/MacOS/ is named
      # after the cargo crate binary name (`dayseam-desktop`), NOT
      # `productName` (`Dayseam`) — Tauri renames the `.app`
      # directory via productName but leaves the inner executable
      # at the cargo name unless `mainBinaryName` is set. DAY-67 was
      # the assertion assuming the inner binary matched the app
      # name. Globbing the single executable under Contents/MacOS/
      # is robust against a future `mainBinaryName` override or a
      # cargo-crate rename; we validate that exactly one is present
      # so a bundler that starts emitting helper bins (unlikely but
      # possible for sidecars) trips the check instead of picking
      # the wrong one silently.
      - name: Assert universal binary (arm64 + x86_64)
        shell: bash
        run: |
          target_dir="$(cargo metadata --format-version 1 --no-deps --manifest-path Cargo.toml | jq -r '.target_directory')"
          app="${target_dir}/universal-apple-darwin/release/bundle/macos/Dayseam.app"
          macos_dir="$app/Contents/MacOS"
          if [[ ! -d "$macos_dir" ]]; then
            echo "::error::Dayseam.app bundle missing at $app" >&2
            exit 1
          fi
          echo "==> Contents/MacOS listing:"
          ls -la "$macos_dir"
          # macOS runners ship bash 3.2 (no `mapfile`), so collect
          # executables with a plain while-read loop.
          bins=()
          while IFS= read -r candidate; do
            bins+=("$candidate")
          done < <(find "$macos_dir" -maxdepth 1 -type f -perm +111)
          if (( ${#bins[@]} != 1 )); then
            echo "::error::Expected exactly one executable in $macos_dir, found ${#bins[@]}: ${bins[*]}" >&2
            exit 1
          fi
          bin="${bins[0]}"
          echo "==> Resolved main binary: $bin"
          archs="$(lipo -archs "$bin")"
          echo "==> lipo -archs: $archs"
          if ! [[ "$archs" == *"arm64"* && "$archs" == *"x86_64"* ]]; then
            echo "::error::Binary is not universal (archs: $archs)" >&2
            exit 1
          fi

      # Info.plist version-parity gate (DAY-102 / DOGFOOD-v0.4-01).
      # The v0.3.0 and v0.4.0 DMGs shipped with `CFBundleShortVersionString
      # = 0.2.1` because `bump-version.sh` silently skipped its three
      # file writers whenever `VERSION` was manually pre-bumped in the
      # capstone PR (which is exactly what the capstone-PR authoring
      # pattern does). The script hardening in scripts/release/
      # prevents that reoccurring going forward; this step is the
      # belt-and-braces defence-in-depth — a single PlistBuddy read
      # that fails the workflow if anything (this script, a future
      # Tauri bundler upgrade, or a hand-edit that bypasses the
      # script) causes Info.plist to drift from the target version
      # before we tag and publish. If this gate had existed, v0.3
      # and v0.4 would both have failed here in red instead of
      # publishing a mis-stamped DMG.
      - name: Assert Info.plist version matches target
        shell: bash
        env:
          TARGET: ${{ steps.bump.outputs.version }}
        run: |
          target_dir="$(cargo metadata --format-version 1 --no-deps --manifest-path Cargo.toml | jq -r '.target_directory')"
          plist="${target_dir}/universal-apple-darwin/release/bundle/macos/Dayseam.app/Contents/Info.plist"
          if [[ ! -f "$plist" ]]; then
            echo "::error::Info.plist missing at $plist" >&2
            exit 1
          fi
          short="$(/usr/libexec/PlistBuddy -c 'Print CFBundleShortVersionString' "$plist")"
          bundle="$(/usr/libexec/PlistBuddy -c 'Print CFBundleVersion' "$plist")"
          echo "==> CFBundleShortVersionString: $short"
          echo "==> CFBundleVersion:            $bundle"
          if [[ "$short" != "$TARGET" ]]; then
            echo "::error::CFBundleShortVersionString '$short' does not match release target '$TARGET'. The DMG would ship mis-stamped — refusing to tag and publish." >&2
            exit 1
          fi
          if [[ "$bundle" != "$TARGET" ]]; then
            echo "::error::CFBundleVersion '$bundle' does not match release target '$TARGET'. The DMG would ship mis-stamped — refusing to tag and publish." >&2
            exit 1
          fi

      # DAY-124 / #59. Signature-mode parity check: verify the
      # built .app actually carries the signature shape the resolved
      # codesign mode promised. In developer-id mode a bundle that
      # came out with an ad-hoc signature (flags: `adhoc`) means the
      # env-var override did not land — Tauri's default-signingIdentity
      # precedence may have changed in a version upgrade, or a
      # downstream step stripped the env before `tauri build` ran.
      # Either way, we would otherwise happily upload an unnotarized
      # DMG to a `--latest` GitHub Release and break every
      # downloader's auto-updater trust chain. Failing here is the
      # belt-and-braces that catches it before publish.
      - name: Assert signature mode matches codesign policy
        shell: bash
        env:
          MODE: ${{ steps.codesign.outputs.mode }}
          EXPECTED_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          target_dir="$(cargo metadata --format-version 1 --no-deps --manifest-path Cargo.toml | jq -r '.target_directory')"
          app="${target_dir}/universal-apple-darwin/release/bundle/macos/Dayseam.app"
          sig_info="$(codesign -dvv "$app" 2>&1 || true)"
          echo "==> codesign -dvv output:"
          echo "$sig_info"

          if [[ "$MODE" == "developer-id" ]]; then
            if echo "$sig_info" | grep -q 'flags=.*adhoc'; then
              echo "::error::developer-id mode was active but the bundle shipped with an ad-hoc signature. Tauri did not honour APPLE_SIGNING_IDENTITY. Refusing to publish." >&2
              exit 1
            fi
            if ! echo "$sig_info" | grep -q "Authority=Developer ID Application"; then
              echo "::error::developer-id mode was active but codesign reports no 'Developer ID Application' authority in the chain. Cert import may have silently failed." >&2
              exit 1
            fi
            echo "==> Developer ID signature verified on ${app}."
          else
            if ! echo "$sig_info" | grep -q 'flags=.*adhoc'; then
              echo "::warning::ad-hoc mode was active but the bundle does NOT carry the adhoc flag. Unexpected — surfacing for review but not failing the build."
            fi
            echo "==> ad-hoc signature confirmed on ${app}."
          fi

      # DAY-124 / #59. Notarize + staple the enclosing .dmg.
      #
      # Tauri's bundler notarizes and staples the inner .app but
      # does NOT submit the .dmg itself to the notary service. For
      # a smooth download experience — no "Verifying Dayseam.dmg…"
      # progress sheet on first open, no online ticket lookup that
      # fails on airplane-mode Macs — the .dmg needs its own
      # stapled ticket. We submit here (fast: Apple re-validates
      # the already-notarized .app inside) and staple the returned
      # ticket so `spctl --assess` against the DMG passes for every
      # downloader regardless of network state.
      - name: Notarize + staple the .dmg (developer-id mode)
        if: steps.codesign.outputs.mode == 'developer-id'
        shell: bash
        env:
          DMG: ${{ steps.build.outputs.dmg }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          echo "==> Submitting $DMG to Apple notary service"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          echo "==> Stapling notarization ticket to $DMG"
          xcrun stapler staple "$DMG"
          echo "==> Validating stapled ticket"
          xcrun stapler validate "$DMG"

      # DAY-124 / #59. Gatekeeper verdict assertion. `spctl --assess`
      # returns the exact pass/fail a downloader's Mac gives when
      # they double-click the .dmg. `accepted` is the verdict we
      # ship; any other outcome (e.g. `rejected`, `source=Unnotarized
      # Developer ID`) means this is a regression vs v0.1.1's
      # "double-click just works" promise and we refuse to publish.
      #
      # This gate is only meaningful when Apple has issued a
      # notarization ticket, which requires:
      #   - A real Developer ID signature (not ad-hoc)
      #   - A successful `xcrun notarytool submit --wait` response
      #   - A stapled ticket (`xcrun stapler staple`)
      #
      # Tauri's bundler handles signing+notarization+stapling of the
      # inner .app automatically when the APPLE_ID / APPLE_PASSWORD /
      # APPLE_TEAM_ID env vars are set; the Notarize + staple the
      # .dmg step above does the same for the enclosing .dmg. A
      # dry-run in developer-id mode still produces a signed +
      # notarized build if the secrets are available, but is gated
      # below to skip the master-push / tag / publish steps — useful
      # for shaking out cert/notary issues without shipping.
      - name: Assert Gatekeeper accepts the signed .dmg (developer-id mode)
        if: steps.codesign.outputs.mode == 'developer-id'
        shell: bash
        env:
          DMG: ${{ steps.build.outputs.dmg }}
        run: |
          set +e
          echo "==> spctl assess on $DMG"
          # `--context context:primary-signature` asks about the DMG
          # signature itself (vs. the enclosed .app). `--type open`
          # is what the Finder's "Open" path runs. --verbose gives
          # a human-readable "source" line we echo for future
          # debugging. We intentionally drop `-e` around this block
          # because `spctl` exits non-zero on rejection and we want
          # to surface its own output rather than an empty fail.
          spctl_output="$(spctl --assess --type open --context context:primary-signature --verbose "$DMG" 2>&1)"
          spctl_rc=$?
          echo "$spctl_output"
          echo "==> spctl exit code: $spctl_rc"
          set -e
          if echo "$spctl_output" | grep -qi 'accepted'; then
            echo "==> Gatekeeper verdict: accepted. Double-click install will not prompt."
          else
            echo "::error::Gatekeeper rejected the signed .dmg. Ticket missing or signature invalid. Investigate the notarytool submission log in the build step above." >&2
            exit 1
          fi

      # Dev-commands symbol guard: Phase 1 split the dev-only IPC
      # commands (`dev_emit_toast`, `dev_start_demo_run`) behind a
      # cargo feature so release bundles cannot expose them. This
      # post-build `nm` check re-asserts that invariant at the
      # already-built binary, so a future regression (say, someone
      # flipping the feature default, or a Tauri bundler change
      # silently linking a dev-only crate) shows up as a CI red here
      # instead of as a shipped attack surface.
      - name: Assert release binary has no dev-only IPC symbols
        shell: bash
        run: |
          target_dir="$(cargo metadata --format-version 1 --no-deps --manifest-path Cargo.toml | jq -r '.target_directory')"
          macos_dir="${target_dir}/universal-apple-darwin/release/bundle/macos/Dayseam.app/Contents/MacOS"
          bins=()
          while IFS= read -r candidate; do
            bins+=("$candidate")
          done < <(find "$macos_dir" -maxdepth 1 -type f -perm +111)
          if (( ${#bins[@]} != 1 )); then
            echo "::error::Expected exactly one executable in $macos_dir, found ${#bins[@]}: ${bins[*]}" >&2
            exit 1
          fi
          bin="${bins[0]}"
          forbidden="$(nm -g "$bin" 2>/dev/null | grep -E 'dev_emit_toast|dev_start_demo_run' || true)"
          if [[ -n "$forbidden" ]]; then
            echo "::error::Release binary exposes dev-only IPC symbols:" >&2
            echo "$forbidden" >&2
            exit 1
          fi
          echo "==> No dev-only IPC symbols present in release binary."

      # Surface the artefact on the workflow run regardless of dry-run
      # status so even a dry-run leaves a downloadable DMG a
      # maintainer can install on a fresh Mac to verify the
      # Gatekeeper-bypass docs still match reality.
      - name: Upload DMG + updater artefacts
        uses: actions/upload-artifact@v4
        with:
          name: Dayseam-v${{ steps.bump.outputs.version }}
          path: |
            dist/release/Dayseam-v${{ steps.bump.outputs.version }}.dmg
            dist/release/Dayseam-v${{ steps.bump.outputs.version }}.dmg.sha256
            dist/release/Dayseam-v${{ steps.bump.outputs.version }}.app.tar.gz
            dist/release/Dayseam-v${{ steps.bump.outputs.version }}.app.tar.gz.sig
            dist/release/latest.json
          retention-days: 30
          if-no-files-found: ignore

      # Commit the version bump (if files changed) so the tagged SHA
      # carries the right `version` metadata. A pre-bumped tree (Task
      # 9 capstone) has nothing to commit and the step no-ops.
      #
      # DAY-164 (supersedes DAY-122 / R-3). The push is now a plain
      # `git push origin HEAD:master` paired with an explicit
      # "our chore commit's parent IS origin/master's tip" assertion
      # before the push.
      #
      # The previous DAY-122 implementation captured the master SHA
      # into `EXPECTED_MASTER` seconds before the push and passed it
      # to `--force-with-lease=master:$EXPECTED_MASTER`. That API
      # only asserts the tip SHA — it does NOT require the pushed
      # commit to be a descendant of the tip. So when Run A's chore
      # commit sat on a stale base (Run B's PR merged to master
      # mid-flight, advancing master to M2 while A's HEAD still
      # pointed at M1 + chore_A), the lease passed (master was
      # indeed at M2 at capture time) and the force-push happily
      # rewound M2 out of master's linear history, orphaning it.
      # Failure mode: v0.8.1's chore(release) commit 56f0c2a is only
      # reachable via the v0.8.1 tag; `git log origin/master` skips
      # it entirely, because v0.8.2's release pushed on top of a
      # stale base using exactly this mechanism.
      #
      # Plain `git push` rejects non-fast-forward pushes by default,
      # which is the correct behaviour here: if master has advanced
      # since our checkout, we must not publish a commit whose
      # parent isn't the current tip, because doing so either (a)
      # drops the intervening work silently (the bug) or (b) needs
      # an explicit rebase the workflow doesn't currently model.
      # The workflow-level `concurrency: release-master-push` group
      # above is the primary guard — it makes Run B wait for Run A
      # to finish pushing, tagging, and publishing before it starts
      # — and this step's descendant assertion is the belt-and-
      # braces that catches the residual race where Run B's
      # merge_commit_sha (stable at PR merge time) is stale relative
      # to current master. In that case we fail loudly with a
      # remediation message rather than silently overwriting.
      - name: Commit version bump (if any)
        id: commit
        if: steps.level.outputs.dry_run != 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # DAY-155: CHANGELOG.md joins the version-bump files so the
          # close-`[Unreleased]` rewrite ships in the same
          # `chore(release)` commit as the version bumps. A release
          # that mutates nothing on master (the capstone-PR idempotent
          # path where every file is already at the target) still
          # hits the "nothing to commit" branch because the porcelain
          # check covers all four files together.
          if [[ -n "$(git status --porcelain VERSION Cargo.toml apps/desktop/src-tauri/tauri.conf.json CHANGELOG.md 2>/dev/null || true)" ]]; then
            git add VERSION Cargo.toml apps/desktop/src-tauri/tauri.conf.json CHANGELOG.md
            git commit -m "chore(release): v${{ steps.bump.outputs.version }}"
            echo "committed=true" >>"$GITHUB_OUTPUT"
          else
            echo "==> Version bump already present on master; nothing to commit."
            echo "committed=false" >>"$GITHUB_OUTPUT"
          fi

      # DAY-164. Assert our chore commit's parent IS origin/master's
      # current tip before we push. The logic lives in
      # `scripts/release/assert-master-descendant.sh` so it carries
      # its own test suite (`test-assert-master-descendant.sh` in
      # the `shell-scripts` matrix on ci.yml) and a future tweak to
      # the assertion semantics doesn't require editing release.yml.
      # Skipped when step 'commit' reports nothing was committed
      # (pre-bumped capstone path).
      - name: Assert chore commit descends from origin/master tip
        if: steps.level.outputs.dry_run != 'true' && steps.commit.outputs.committed == 'true'
        run: |
          scripts/release/assert-master-descendant.sh

      # DAY-164. Plain `git push` — no `--force-with-lease`. Plain
      # push rejects non-fast-forward pushes by default (git exit
      # code 1 with 'Updates were rejected because the remote
      # contains work that you do not have locally'), which is the
      # correct failure mode here. The descendant assertion above
      # is the primary gate; this push is strictly a fast-forward
      # once we've passed it.
      - name: Push chore commit to master
        if: steps.level.outputs.dry_run != 'true' && steps.commit.outputs.committed == 'true'
        run: |
          set -euo pipefail
          git push origin HEAD:master

      - name: Tag the release
        if: steps.level.outputs.dry_run != 'true'
        run: |
          tag="v${{ steps.bump.outputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "==> Tag $tag already exists; skipping."
            exit 0
          fi
          git tag -a "$tag" -m "Dayseam $tag"
          git push origin "$tag"

      # Publish the GitHub Release with the DMG + SHA-256 attached.
      # The body is the release-notes file produced by the earlier
      # preflight step — exactly what was gated on non-emptiness at
      # the start of the run, so there's no second extraction and no
      # gate-vs-publish drift. `gh release create --latest` makes
      # this the project's latest release exactly once per tagged
      # version.
      - name: Publish GitHub Release
        if: steps.level.outputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.bump.outputs.version }}
          DMG: ${{ steps.build.outputs.dmg }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
          UPDATER_TAR: ${{ steps.updater.outputs.tar }}
          UPDATER_SIG: ${{ steps.updater.outputs.sig }}
          UPDATER_JSON: ${{ steps.updater.outputs.json }}
        run: |
          if [[ ! -s "$NOTES_FILE" ]]; then
            echo "::error::Release notes file missing or empty at $NOTES_FILE (preflight drift)." >&2
            exit 1
          fi
          # DAY-108: attach the updater artefacts so
          # `/releases/latest/download/latest.json` resolves to
          # this release's manifest once `--latest` takes effect.
          # Missing any of the three would leave installed clients
          # hitting a 404 on their next check; the assemble step
          # above already guarded against the source files being
          # absent.
          for f in "$UPDATER_TAR" "$UPDATER_SIG" "$UPDATER_JSON"; do
            if [[ ! -s "$f" ]]; then
              echo "::error::Updater artefact missing or empty: $f" >&2
              exit 1
            fi
          done
          gh release create "v${VERSION}" \
            "${DMG}" \
            "${DMG}.sha256" \
            "${UPDATER_TAR}" \
            "${UPDATER_SIG}" \
            "${UPDATER_JSON}" \
            --title "Dayseam v${VERSION}" \
            --notes-file "$NOTES_FILE" \
            --latest

      # DAY-124 / #59. Tauri's bundler creates a `tauri-build.keychain`
      # inside its own temp dir for the signing step; we do not create
      # any keychain ourselves (see tauri-apps/tauri#9760 for why a
      # duplicate import would break the build). The ephemeral runner
      # image is discarded at job end, so Tauri's keychain has no
      # further lifetime. This step is a belt-and-braces best-effort
      # cleanup in case a Tauri version change starts leaking one and
      # we haven't noticed yet — `|| true` on every command keeps the
      # step green when there's nothing to clean.
      - name: Best-effort keychain cleanup
        if: always() && steps.codesign.outputs.mode == 'developer-id'
        run: |
          security delete-keychain tauri-build.keychain 2>/dev/null || true
