# `cargo audit` configuration.
#
# Kept in lockstep with `deny.toml`. `cargo deny check advisories` and
# `cargo audit` inspect Cargo.lock slightly differently (deny walks the
# active feature graph; audit scans every crate in the lockfile), so the
# two tools can disagree on whether a transitive advisory is reachable.
# Since both run in CI we mirror the ignore list here, with the same
# one-line rationale next to each entry.

[advisories]
ignore = [
    # Unmaintained Unicode crates pulled in transitively by Tauri's
    # `urlpattern` → `tauri-utils` path. No safe upgrade exists today.
    "RUSTSEC-2025-0075", # unic-char-range is unmaintained; transitive via tauri-utils
    "RUSTSEC-2025-0080", # unic-common is unmaintained; transitive via tauri-utils
    "RUSTSEC-2025-0081", # unic-char-property is unmaintained; transitive via tauri-utils
    "RUSTSEC-2025-0098", # unic-ucd-version is unmaintained; transitive via tauri-utils
    "RUSTSEC-2025-0100", # unic-ucd-ident is unmaintained; transitive via tauri-utils
    "RUSTSEC-2024-0388", # derivative is unmaintained; transitive via zbus/keyring
    "RUSTSEC-2025-0057", # fxhash is unmaintained; transitive via a Tauri dep

    # GTK Rust bindings pulled in by Tauri on Linux even when we target macOS.
    "RUSTSEC-2024-0411", # gtk is unmaintained
    "RUSTSEC-2024-0412", # atk is unmaintained
    "RUSTSEC-2024-0413", # atk-sys is unmaintained
    "RUSTSEC-2024-0414", # gdk is unmaintained
    "RUSTSEC-2024-0415", # gdk-sys is unmaintained
    "RUSTSEC-2024-0416", # gdkwayland-sys is unmaintained
    "RUSTSEC-2024-0417", # gdkx11 is unmaintained
    "RUSTSEC-2024-0418", # gdkx11-sys is unmaintained
    "RUSTSEC-2024-0419", # gtk-sys is unmaintained
    "RUSTSEC-2024-0420", # gtk3-macros is unmaintained
    "RUSTSEC-2024-0429", # glib VariantStrIter unsound iter impl; transitive via tauri/wry

    # Additional zbus / async-std churn pulled in by `keyring` on Linux.
    "RUSTSEC-2024-0384", # instant is unmaintained; transitive via zbus on Linux
    "RUSTSEC-2024-0370", # proc-macro-error is unmaintained; transitive via zbus on Linux

    # `rsa` Marvin timing attack. Pulled in by sqlx-mysql for macro
    # expansion only; we compile sqlx with default-features = false,
    # features = ["sqlite"], so no MySQL code is linked into any shipped
    # binary.
    "RUSTSEC-2023-0071", # rsa Marvin attack; reachable only via sqlx-mysql

    # `rand 0.7` unsound-with-custom-logger issue. Pulled in at
    # build time by phf_generator → selectors → kuchikiki, which
    # Tauri uses for HTML rewriting during `tauri-build` codegen.
    # Never linked into the runtime binary.
    "RUSTSEC-2026-0097", # rand 0.7 unsound with custom logger; build-time only via tauri codegen
]
