[package]
name = "dayseam-desktop"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
description = "Dayseam desktop shell (Tauri 2)."

[lib]
name = "dayseam_desktop"
path = "src/lib.rs"

[[bin]]
name = "dayseam-desktop"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde_json = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
tokio = { workspace = true }
tokio-util = { version = "0.7", features = ["rt"] }
sqlx = { version = "0.8", default-features = false, features = [
    "runtime-tokio",
    "sqlite",
] }
tracing = { workspace = true }
tauri = { version = "2", features = [] }
dayseam-core = { path = "../../../crates/dayseam-core", version = "0.0.0" }
dayseam-db = { path = "../../../crates/dayseam-db", version = "0.0.0" }
dayseam-events = { path = "../../../crates/dayseam-events", version = "0.0.0" }
dayseam-secrets = { path = "../../../crates/dayseam-secrets", version = "0.0.0", features = ["keychain"] }

[dev-dependencies]
tempfile = "3"
tauri = { version = "2", features = ["test"] }

[features]
# `custom-protocol` wires in Tauri's custom-protocol flag for release
# bundles — unchanged from the scaffold.
custom-protocol = ["tauri/custom-protocol"]
# `dev-commands` compiles in the `dev_*` IPC commands (`dev_emit_toast`,
# `dev_start_demo_run`) used by the frontend test harness and the in-app
# dev tray. It is **off by default** so a plain `cargo build --release`
# or `cargo tauri build` ships a binary with no dev surface and no dev
# capability grant. The build script writes `capabilities/dev.json` only
# when this feature is on; `capabilities/default.json` carries only
# production permissions. Development and CI (including `pnpm tauri dev`)
# re-enable it with `--features dev-commands`.
dev-commands = []
default = []
